# CI/CD: test → build Docker images → push to Docker Hub
# Secrets (GitHub repo → Settings → Secrets → Actions):
#   DOCKER_USERNAME, DOCKER_PASSWORD (Docker Hub access token)

name: Smart Farming CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_API: ${{ secrets.DOCKER_USERNAME }}/smart-farming-api
  IMAGE_WEB: ${{ secrets.DOCKER_USERNAME }}/smart-farming-web

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend tests
        run: |
          cd backend
          pip install -r requirements.txt
          pytest -q

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:latest
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
          build-args: |
            API_INTERNAL_URL=http://backend:8000
