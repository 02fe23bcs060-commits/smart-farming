---
- name: Deploy Smart Farming on AWS EC2
  hosts: ec2
  become: true
  vars:
    app_dir: /opt/smart-farming
    repo_url: "{{ lookup('env', 'GIT_REPO_URL') | default('https://github.com/YOUR_ORG/smart-farming.git', true) }}"

  tasks:
    - name: Install Docker dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - git
        state: present
        update_cache: true

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker and Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Add deploy user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        mode: "0755"

    - name: Clone or update application repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: main
        force: true
      become_user: "{{ ansible_user }}"

    - name: Copy environment file
      template:
        src: env.j2
        dest: "{{ app_dir }}/.env"
        owner: "{{ ansible_user }}"
        mode: "0600"

    - name: Start application with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        state: present
        build: always
      become_user: "{{ ansible_user }}"

    - name: Configure UFW for HTTP/HTTPS
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "22"
        - "80"
        - "443"
        - "3000"
        - "8000"

    - name: Enable UFW
      ufw:
        state: enabled
